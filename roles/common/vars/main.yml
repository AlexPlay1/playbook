# admin user
admin_user: deploy
# admin_password: "{{ admin_password }}"
admin_public_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

# ssh
ssh_port: 22 
ssh_allowed_users: "{{ admin_user }}"

# firewall
ufw_allowed_ports:
  - "{{ ssh_port }}"
  - 80
  - 443

# fail2ban
fail2ban_maxretry: 2
fail2ban_bantime: 3600
fail2ban_findtime: 600
