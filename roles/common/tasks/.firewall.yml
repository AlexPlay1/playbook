# Firewall setup
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Ensure the ufw service is running
  ansible.builtin.service:
    name: ufw
    enabled: true
    state: started

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow configured ports # do better
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ ufw_allowed_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
